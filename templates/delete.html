{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Task</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-card">
    <div class="auth-header" style="font-size:16px; padding: 16px 20px;">
        <a href="{% url 'home' %}" style="color:white;">← Go Back</a>
    </div>
    <div class="auth-content">
        <p style="margin-top:0; margin-bottom:20px; color:#333; font-size:15px;">
            Are your sure you want to delete this task? <strong>"{{ task.title }}"</strong>
        </p>
        <form method="POST">
            {% csrf_token %}
            <button class="btn" type="submit">Delete</button>
        </form>
    </div>
</div>
</body>
</html>
